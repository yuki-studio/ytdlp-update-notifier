name: Daily yt-dlp Check

on:
  schedule:
    # Run daily at 22:00 UTC (06:00 Beijing Time).
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - test-notify

permissions:
  contents: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.ref }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run check
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        CMD="${{ github.event.inputs.command }}"
        if [ -z "$CMD" ]; then CMD="check"; fi
        python -m src.main "$CMD"

    - name: Commit updated state
      run: |
        if [ ! -f .state/last_version.json ]; then
          echo "No state file generated."
          exit 0
        fi

        if git diff --quiet -- .state/last_version.json; then
          echo "State unchanged."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .state/last_version.json
        git commit -m "chore: update notifier state [skip ci]"
        git push origin HEAD:${GITHUB_REF#refs/heads/}
