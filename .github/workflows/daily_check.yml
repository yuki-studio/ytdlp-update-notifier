name: Daily yt-dlp Check

on:
  schedule:
    # Run daily at 22:00 UTC (06:00 Beijing Time).
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - test-notify

jobs:
  check-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Restore state
      uses: actions/cache@v3
      with:
        path: .state/last_version.json
        key: state-v1-${{ runner.os }}
        restore-keys: |
          state-v1-${{ runner.os }}

    - name: Run check
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        CMD="${{ github.event.inputs.command }}"
        if [ -z "$CMD" ]; then CMD="check"; fi
        python -m src.main "$CMD"

    - name: Save state
      if: always()
      uses: actions/cache/save@v3
      with:
        path: .state/last_version.json
        key: state-v1-${{ runner.os }}-${{ github.run_id }}
